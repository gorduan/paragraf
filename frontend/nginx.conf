server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # SPA Routing – alle unbekannten Pfade zu index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API Reverse Proxy zum Backend
    # resolver mit kurzer TTL damit nginx Backend-IP-Aenderungen mitbekommt
    # (Docker-interner DNS = 127.0.0.11)
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_upstream http://backend:8000;

    location /api/ {
        # Variable proxy_pass: nginx leitet den Original-URI 1:1 weiter
        # (/api/health → backend:8000/api/health)
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE-Streaming (fuer Indexierung)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # Static Assets Caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
