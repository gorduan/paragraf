services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: paragraf-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  mcp-server:
    build: .
    container_name: paragraf-server
    ports:
      - "8000:8000"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=paragraf
      - EMBEDDING_MODEL=BAAI/bge-m3
      - EMBEDDING_DEVICE=cpu
      - EMBEDDING_BATCH_SIZE=8
      - EMBEDDING_MAX_LENGTH=512
      - RERANKER_MODEL=BAAI/bge-reranker-v2-m3
      - RERANKER_TOP_K=5
      - MCP_TRANSPORT=streamable-http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
      - LOG_LEVEL=INFO
      - DATA_DIR=/app/data
    volumes:
      - mcp-data:/app/data
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/mcp"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

volumes:
  qdrant-data:
    driver: local
  mcp-data:
    driver: local
