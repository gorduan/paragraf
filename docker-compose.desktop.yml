services:
  # ── Qdrant Vektordatenbank ──────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__STORAGE__SNAPSHOTS_PATH=/qdrant/storage/snapshots
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Python Backend (FastAPI + ML-Modelle) ──────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ${PARAGRAF_MODEL_CACHE:-model_cache}:/models
      - law_data:/data
    environment:
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=paragraf
      - EMBEDDING_MODEL=BAAI/bge-m3
      - EMBEDDING_DEVICE=cpu
      - EMBEDDING_BATCH_SIZE=8
      - EMBEDDING_MAX_LENGTH=512
      - RERANKER_MODEL=BAAI/bge-reranker-v2-m3
      - RERANKER_TOP_K=5
      - RETRIEVAL_TOP_K=20
      - FINAL_TOP_K=5
      - SIMILARITY_THRESHOLD=0.35
      - BATCH_MAX_QUERIES=10
      - SCROLL_PAGE_SIZE=10
      - RECOMMEND_DEFAULT_LIMIT=10
      - GROUP_SIZE_DEFAULT=3
      - GROUP_MAX_GROUPS=10
      - DISCOVERY_MAX_POSITIVE=5
      - DISCOVERY_MAX_NEGATIVE=5
      - XREF_RESOLUTION_STRATEGY=filter
      - QUERY_EXPANSION_STRATEGY=append
      - QUERY_EXPANSION_ENABLED=true
      - SYNONYMS_JSON_PATH=
      - CHUNK_MIN_LENGTH_FOR_SPLIT=800
      - CHUNK_SATZ_MIN_LENGTH=100
      - MULTI_HOP_MAX_DEPTH=3
      - MULTI_HOP_RESULTS_PER_HOP=5
      - SNAPSHOT_MAX_COUNT=3
      - LOG_LEVEL=INFO
      - HF_HOME=/models
      - TORCH_HOME=/models/torch
      - DATA_DIR=/data
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  # ── MCP-Server (Streamable HTTP fuer Claude Desktop/Code) ──────────────────
  mcp:
    build: ./backend
    ports:
      - "8001:8001"
    volumes:
      - ${PARAGRAF_MODEL_CACHE:-model_cache}:/models
      - law_data:/data
    environment:
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=paragraf
      - EMBEDDING_MODEL=BAAI/bge-m3
      - EMBEDDING_DEVICE=cpu
      - EMBEDDING_BATCH_SIZE=8
      - EMBEDDING_MAX_LENGTH=512
      - RERANKER_MODEL=BAAI/bge-reranker-v2-m3
      - RERANKER_TOP_K=5
      - RETRIEVAL_TOP_K=20
      - FINAL_TOP_K=5
      - SIMILARITY_THRESHOLD=0.35
      - BATCH_MAX_QUERIES=10
      - SCROLL_PAGE_SIZE=10
      - RECOMMEND_DEFAULT_LIMIT=10
      - GROUP_SIZE_DEFAULT=3
      - GROUP_MAX_GROUPS=10
      - DISCOVERY_MAX_POSITIVE=5
      - DISCOVERY_MAX_NEGATIVE=5
      - XREF_RESOLUTION_STRATEGY=filter
      - QUERY_EXPANSION_STRATEGY=append
      - QUERY_EXPANSION_ENABLED=true
      - SYNONYMS_JSON_PATH=
      - CHUNK_MIN_LENGTH_FOR_SPLIT=800
      - CHUNK_SATZ_MIN_LENGTH=100
      - MULTI_HOP_MAX_DEPTH=3
      - MULTI_HOP_RESULTS_PER_HOP=5
      - SNAPSHOT_MAX_COUNT=3
      - LOG_LEVEL=INFO
      - HF_HOME=/models
      - TORCH_HOME=/models/torch
      - DATA_DIR=/data
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8001
      - MCP_TRANSPORT=streamable-http
    command: ["python", "-m", "paragraf", "--mode", "mcp"]
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

volumes:
  qdrant_data:
  model_cache:
  law_data:
