appId: de.paragraf.desktop
productName: Paragraf
copyright: Copyright (c) 2026 Paragraf

directories:
  buildResources: resources
  output: release

files:
  - out/**/*
  - "!out/renderer/**/*"

extraResources:
  - from: out/renderer
    to: renderer
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopIcon: true
  createStartMenuShortcut: true
  shortcutName: Paragraf
  menuCategory: Paragraf
  artifactName: "Paragraf-Setup-${version}.${ext}"
