appId: de.paragraf.desktop
productName: Paragraf
copyright: Copyright (c) 2026 Paragraf

directories:
  buildResources: build
  output: release

files:
  - out/**/*
  - "!out/renderer/**/*"

extraResources:
  - from: out/renderer
    to: renderer
    filter:
      - "**/*"
  - from: ../docker-compose.desktop.yml
    to: docker-compose.desktop.yml
  - from: ../backend
    to: backend
    filter:
      - "**/*"
      - "!**/__pycache__/**"
      - "!**/.pytest_cache/**"

# ── Windows ──────────────────────────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Paragraf
  menuCategory: Paragraf
  artifactName: "Paragraf-Setup-${version}-win-x64.${ext}"
  license: build/license.rtf

# ── macOS ────────────────────────────────────────────────────────────────────
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: resources/icon.png
  category: public.app-category.reference
  artifactName: "Paragraf-${version}-mac-${arch}.${ext}"

dmg:
  title: "Paragraf ${version}"

# ── Linux ────────────────────────────────────────────────────────────────────
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: resources/icon.png
  category: Education
  artifactName: "Paragraf-${version}-linux-x64.${ext}"

appImage:
  artifactName: "Paragraf-${version}-linux-x64.AppImage"
