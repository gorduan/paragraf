appId: de.paragraf.desktop
productName: Paragraf
copyright: Copyright (c) 2026 Paragraf

directories:
  buildResources: build
  output: release

files:
  - out/**/*
  - "!out/renderer/**/*"

extraResources:
  - from: out/renderer
    to: renderer
    filter:
      - "**/*"
  - from: ../docker-compose.desktop.yml
    to: docker-compose.desktop.yml
  - from: ../backend
    to: backend
    filter:
      - "**/*"
      - "!**/__pycache__/**"
      - "!**/.pytest_cache/**"

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopIcon: true
  createStartMenuShortcut: true
  shortcutName: Paragraf
  menuCategory: Paragraf
  artifactName: "Paragraf-Setup-${version}.${ext}"
  license: build/license.rtf
